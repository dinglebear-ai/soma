name: rmcp release monitor

on:
  schedule:
    # Daily at 07:17 UTC. Offset minute avoids the scheduled-workflow stampede.
    - cron: "17 7 * * *"
  workflow_dispatch: {}

permissions:
  contents: read
  issues: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  monitor:
    name: Watch rmcp crate releases
    runs-on: [self-hosted, Linux, rmcp-template, dookie]
    timeout-minutes: 15
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Fetch rmcp crate metadata
        run: |
          curl -fsSL \
            -H "User-Agent: jmagar/rmcp-template rmcp-release-monitor" \
            https://crates.io/api/v1/crates/rmcp \
            -o rmcp-crate.json

      - name: Fetch rmcp GitHub release notes
        run: |
          gh api \
            "repos/modelcontextprotocol/rust-sdk/releases?per_page=100" \
            > rmcp-releases.json

      - name: Render rmcp release issue body
        id: monitor
        run: |
          cargo xtask rmcp-release-monitor \
            --crate-json rmcp-crate.json \
            --releases-json rmcp-releases.json \
            --issue-body rmcp-release-issue.md

      - name: Open or update rmcp release issue
        if: steps.monitor.outputs.drift == 'true'
        run: |
          title="${{ steps.monitor.outputs.issue_title }}"
          existing="$(
            gh issue list \
              --state open \
              --search "rmcp-release-monitor in:body" \
              --json number \
              --jq ".[0].number // \"\""
          )"
          if [ -n "$existing" ]; then
            gh issue edit "$existing" \
              --title "$title" \
              --body-file rmcp-release-issue.md
          else
            gh issue create \
              --title "$title" \
              --body-file rmcp-release-issue.md
          fi

      - name: Close resolved rmcp release issue
        if: steps.monitor.outputs.drift == 'false'
        run: |
          existing="$(
            gh issue list \
              --state open \
              --search "rmcp-release-monitor in:body" \
              --json number \
              --jq ".[0].number // \"\""
          )"
          if [ -n "$existing" ]; then
            gh issue comment "$existing" \
              --body "The template rmcp pin now matches the latest published rmcp crate; closing this release-monitor issue."
            gh issue close "$existing" \
              --comment "rmcp release monitor resolved."
          fi
